<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Media Hub</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="background"></div>

<header class="hero">

    <h1>🚀 MY MEDIA HUB</h1>

    <p>
        Add Videos • Websites • Notes
    </p>

</header>

<section class="top">

<button id="addCard">

➕ Add New Card

</button>

</section>

<section id="cards">

<div class="card">

<div class="left">

<input
type="text"
placeholder="Video Title"
class="title">

<textarea
placeholder="Write about this video..."
class="description"></textarea>

<input
type="text"
placeholder="Website Link"
class="website">

</div>

<div class="right">

<input
type="text"
placeholder="Paste Video Embed Link"
class="videoLink">

<iframe
class="video"
allowfullscreen>
</iframe>

<button class="open">

Open Website

</button>

</div>

</div>

</section>

<script src="script.js"></script>

</body>
</html>
